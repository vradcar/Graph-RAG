project:
  name: GraphRAG-POC
  domain: product_compatibility

graph:
  backend: neo4j          # changed from networkx
  max_default_depth: 2
  neo4j_uri: bolt://localhost:7687
  neo4j_user: neo4j
  neo4j_password: "password"

retrieval:
  mode: hybrid
  top_k_chunks: 5

evaluation:
  queries_file: data/eval/queries.json
  output_file: data/eval/results.json

llm:
  provider: groq  # or "openai"
  model: moonshotai/kimi-k2-instruct-0905  # groq model; for openai use e.g. "gpt-4o-mini"
