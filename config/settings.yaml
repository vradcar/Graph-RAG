project:
  name: GraphRAG-POC
  domain: product_compatibility

graph:
  backend: neo4j          # changed from networkx
  max_default_depth: 2
  neo4j_uri: bolt://localhost:7687
  neo4j_user: neo4j
  # neo4j_password: set NEO4J_PASSWORD env var instead

retrieval:
  mode: hybrid
  top_k_chunks: 5

evaluation:
  queries_file: data/eval/queries.json
  output_file: data/eval/results.json

llm:
  provider: openai
  model: gpt-4.1
